x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 100m
      max-file: 5

x-env: &env
  env_file: .env

services:
  remnashop-db:
    image: postgres:18.4-trixie
    container_name: remnashop-db
    hostname: remnashop-db
    <<: [ *logging, *env ]
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=UTC
    ports:
      - 127.0.0.1:6543:5432
    volumes:
      - remnashop-db-data:/var/lib/postgresql
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d postgres' ]
      interval: 3s
      timeout: 10s
      retries: 3

  remnashop-app:
    build: .
    container_name: remnashop-app
    <<: [ *logging, *env ]
    ports:
      - "8080:8080"
    depends_on:
      remnashop-db:
        condition: service_healthy

volumes:
  remnashop-db-data:
    name: remnashop-db-data
    driver: local
    external: false