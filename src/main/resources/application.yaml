spring:
  application:
    name: remnashop
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: PT1H

integration:
  remnawave:
    base-url: ${REMNAWAVE_URL}
    api-key: ${REMNAWAVE_API_KEY}

logging:
  level:
    org.springframework.security: TRACE