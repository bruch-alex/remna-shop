spring:
  application:
    name: remna-shop
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
app:
  vpn:
    test-period:
      duration: PT24H
      traffic-limit-bytes: 1073741824
  jwt:
    secret: ${JWT_SECRET}
    expiration: PT1H

integration:
  remnawave:
    base-url: ${REMNAWAVE_URL}
    api-key: ${REMNAWAVE_API_KEY}

logging:
  level:
    org.springframework.security: TRACE